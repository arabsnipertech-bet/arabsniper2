name: ArabSniper Fast Scan

on:
  workflow_dispatch:
  schedule:
    # Fast scan ogni ora dalle 06:00 alle 23:00 Europe/Rome.
    # Il codice Python ora pulisce automaticamente le partite fuori finestra live.
    - cron: "0 6-23 * * *"
      timezone: "Europe/Rome"

permissions:
  contents: write
  actions: read

concurrency:
  group: arabsniper-fast-scan
  cancel-in-progress: false

jobs:
  fast-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    env:
      API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install streamlit requests pandas PyGithub || true

      - name: Run fast pair workflow
        run: python src/3appdays_runner.py --fast-pair
