name: ArabSniper Fast Scan

on:
  workflow_dispatch:
  schedule:
    # Mattina: dalle 06:00 alle 12:00 ogni 2 ore
    - cron: "0 6,8,10,12 * * *"
      timezone: "Europe/Rome"

    # Pomeriggio/sera: ogni 90 minuti
    # 13:30 / 16:30 / 19:30 / 22:30
    - cron: "30 13,16,19,22 * * *"
      timezone: "Europe/Rome"

    # 15:00 / 18:00 / 21:00
    - cron: "0 15,18,21 * * *"
      timezone: "Europe/Rome"

permissions:
  contents: write
  actions: read

concurrency:
  group: arabsniper-fast-scan
  cancel-in-progress: false

jobs:
  fast-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install streamlit requests pandas PyGithub || true

      - name: Run fast pair workflow
        run: python src/3appdays_runner.py --fast-pair
