name: Run Auditor Replay

on:
  workflow_dispatch:
    inputs:
      audit_date:
        description: 'Data da rigenerare in formato YYYY-MM-DD'
        required: true
        default: '2026-03-27'

jobs:
  auditor_replay:
    runs-on: ubuntu-latest

    env:
      API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run audit replay
        run: |
          echo "Rigenero audit per la data: ${{ github.event.inputs.audit_date }}"
          python auditor/run_audit.py --date "${{ github.event.inputs.audit_date }}"

      - name: Commit and push replay results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add auditarchive/
          git commit -m "Replay auditor for ${{ github.event.inputs.audit_date }}" || echo "No changes to commit"
          git push
