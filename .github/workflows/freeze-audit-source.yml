name: Freeze Audit Source

on:
  workflow_dispatch:
  schedule:
    - cron: '37 8 * * *'
      timezone: 'Europe/Rome'

jobs:
  freeze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run freeze script
        run: |
          python auditor/freeze_for_audit.py

      - name: Commit and push freeze
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add auditordata/
          git commit -m "Freeze audit source" || echo "No changes to commit"
          git push
